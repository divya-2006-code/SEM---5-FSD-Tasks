<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation Example</title>

    <style>
        body{
            background-color: #fff8dc;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
        }

        h2{
            color: #8b0000;
        }

        #message{
            font-size: 24px;
            color: navy;
            font-weight: bold;
            margin: 20px;
        }

        button{
            background-color: darkorange;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover{
            background-color: orangered;
        }
    </style>
</head>

<body>

    <h2>DOM Text Change Example</h2>

    <p id="message">Welcome to JavaScript</p>

    <button onclick="changeText()">
        Change Text
    </button>

    <script>
        function changeText(){
            let msg = document.getElementById("message");

            msg.innerText = "Text Changed Using DOM!";
            msg.style.color = "green";
            msg.style.fontSize = "30px";
        }
    </script>

</body>
</html>
