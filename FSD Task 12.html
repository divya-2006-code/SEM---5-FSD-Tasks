<!DOCTYPE html>
<html>
<head>
    <title>Laptop Service Request Form</title>

    <style>
        body{
            font-family: Arial;
            background-color: lightblue;
        }

        .container{
            width: 400px;
            margin: auto;
            margin-top: 40px;
            background-color: white;
            padding: 20px;
            border: 2px solid gray;
        }

        h2{
            text-align: center;
            color: darkblue;
        }

        label{
            font-weight: bold;
        }

        input,
        select,
        textarea{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button{
            padding: 10px 20px;
            background-color: darkblue;
            color: white;
            border: none;
        }

        button:hover{
            background-color: blue;
        }
    </style>

    <script>

        function validateForm(){

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;
            let brand = document.getElementById("brand").value;
            let service = document.getElementById("service").value;

            if(name==""){
                alert("Please enter your name.");
                return false;
            }

            if(email==""){
                alert("Please enter your email.");
                return false;
            }

            if(phone==""){
                alert("Please enter your phone number.");
                return false;
            }

            if(brand==""){
                alert("Please enter laptop brand.");
                return false;
            }

            if(service==""){
                alert("Please select service type.");
                return false;
            }

            alert("Service Request Submitted Successfully!");
            return true;

        }

    </script>

</head>

<body>

<div class="container">

<h2>Laptop Service Request</h2>

<form onsubmit="return validateForm()">

<label>Customer Name</label>

<input
type="text"
id="name"
placeholder="Enter your name">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter your email">

<label>Phone Number</label>

<input
type="text"
id="phone"
placeholder="Enter phone number">

<label>Laptop Brand</label>

<input
type="text"
id="brand"
placeholder="Enter laptop brand">

<label>Service Type</label>

<select id="service">

<option value="">Select</option>

<option>Screen Repair</option>

<option>Battery Replacement</option>

<option>Keyboard Repair</option>

<option>Software Installation</option>

</select>

<label>Problem Description</label>

<textarea
rows="4"
placeholder="Describe the problem">
</textarea>

<br>

<button type="submit">Submit</button>

<button type="reset">Reset</button>

</form>

</div>

</body>
</html>
